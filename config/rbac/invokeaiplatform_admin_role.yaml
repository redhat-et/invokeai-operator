# This rule is not used by the project invokeai-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over invokeai.redhat.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: invokeai-operator
    app.kubernetes.io/managed-by: kustomize
  name: invokeaiplatform-admin-role
rules:
- apiGroups:
  - invokeai.redhat.com
  resources:
  - invokeaiplatforms
  verbs:
  - '*'
- apiGroups:
  - invokeai.redhat.com
  resources:
  - invokeaiplatforms/status
  verbs:
  - get
