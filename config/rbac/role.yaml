---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - invokeai.redhat.com
  resources:
  - invokeaiplatforms
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - invokeai.redhat.com
  resources:
  - invokeaiplatforms/finalizers
  verbs:
  - update
- apiGroups:
  - invokeai.redhat.com
  resources:
  - invokeaiplatforms/status
  verbs:
  - get
  - patch
  - update
